spring:
  application:
    name: agent
  # 开启虚拟线程
  threads:
    virtual:
      enabled: true

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 70MB
      file-size-threshold: 2MB


  ai:
    model:
      audio:
        speech: none
        transcription: none
      image: none
      moderation: none

    openai:
      chat:
        api-key: ${Silicon_Flow_API_KEY}
        base-url: https://api.siliconflow.cn
        options:
          model: Qwen/Qwen3.6-35B-A3B
          temperature: 0.7

      embedding:
        api-key: ${BaiLian_API_KEY}
        base-url: https://dashscope.aliyuncs.com/compatible-mode
        options:
          model: text-embedding-v3
          dimensions: 1536

  datasource:
    url: jdbc:postgresql://localhost:5432/kenagent
    username: ${POSTGRESQL_USER}
    password: ${POSTGRESQL_PASSWORD}
    driver-class-name: org.postgresql.Driver

agent:
  storage:
    s3:
      enabled: ${RUSTFS_ENABLED:true}
      bucket-name: ${RUSTFS_BUCKET_NAME:}
      endpoint: ${RUSTFS_ENDPOINT:http://localhost:9000}
      region: ${RUSTFS_REGION:us-east-1}
      access-key: ${RUSTFS_ACCESS_KEY:}
      secret-key: ${RUSTFS_SECRET_KEY:}
      path-style-access: true




